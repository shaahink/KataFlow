name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: '22'

jobs:
  dotnet-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - run: dotnet restore

      - run: dotnet build --no-restore --configuration Release --warningsaserrors

      - name: Unit tests
        run: dotnet test --no-build --configuration Release --filter "Category=Unit"

  integration-tests:
    runs-on: ubuntu-latest
    needs: dotnet-build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - name: Integration tests
        run: dotnet test --no-build --configuration Release --filter "Category=Integration"

  e2e-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/KataFlow.Web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '${{ env.DOTNET_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}' }

      - name: Restore .NET
        working-directory: .
        run: dotnet restore

      - uses: actions/cache@v4
        with:
          path: src/KataFlow.Web/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('src/KataFlow.Web/package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Angular
        run: npx ng build --configuration production

      - name: Run Playwright E2E tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: src/KataFlow.Web/playwright-report/
